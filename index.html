<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FaceLife+ Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-6">
    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="bg-slate-900 p-5 rounded border border-slate-800">
            <h2 class="font-bold text-indigo-400 mb-4">AI Generator</h2>
            <textarea id="prompt" class="w-full bg-slate-950 p-3 rounded text-sm border border-slate-700 mb-3" rows="4" placeholder="Tuliskan prompt AI..."></textarea>
            <button onclick="sendPrompt()" id="btn" class="w-full bg-indigo-600 py-2 rounded text-xs font-bold hover:bg-indigo-500">Generate Post</button>
        </div>

        <div class="lg:col-span-2 space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-emerald-400">Feed Terbaru</h2>
                <button onclick="alert('Fitur Upload')" class="bg-sky-600 px-3 py-1 rounded text-[10px]">Upload Media</button>
            </div>
            <div id="feed" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        async function sendPrompt() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('btn');
            if(!prompt) return alert("Isi prompt dulu!");
            
            btn.innerText = "Processing...";
            const res = await fetch("/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await res.json();
            
            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = "bg-slate-900 p-4 rounded border border-slate-800";
            div.innerHTML = `
                <p class="text-xs font-bold text-indigo-300">FaceLife AI</p>
                <p class="text-sm mt-1">${data.result}</p>
                <div class="flex gap-4 mt-3 text-[10px] text-slate-500">
                    <button onclick="this.innerText='Liked!'">❤️ Like</button>
                    <button>💬 Komentar</button>
                </div>
            `;
            feed.prepend(div);
            btn.innerText = "Generate Post";
        }
    </script>
</body>
</html>
